<head>

<body>

<nav class="side-nav" aria-label="시리즈 선택">
    <ul id="series-list"></ul>
</nav>

<div class="main-content" id="main-content"></div>

<script>
// 스마트 캐시 관리 스크립트
(function() {
    const CURRENT_VERSION = 'c1804b80';
    const STORAGE_KEY = 'numberblocks_version';
    
    // 저장된 버전 확인
    function getStoredVersion() {
        try {
            return localStorage.getItem(STORAGE_KEY);
        } catch (e) {
            return null;
        }
    }
    
    // 버전 저장
    function setStoredVersion(version) {
        try {
            localStorage.setItem(STORAGE_KEY, version);
        } catch (e) {
            // localStorage 사용 불가능한 경우 무시
        }
    }
    
    // 버전이 변경되었는지 확인
    function isVersionChanged() {
        const storedVersion = getStoredVersion();
        return storedVersion !== CURRENT_VERSION;
    }
    
    // 캐시 무효화가 필요한 경우에만 새로고침
    function checkAndReload() {
        if (isVersionChanged()) {
            console.log('버전이 변경되어 캐시를 무효화합니다:', getStoredVersion(), '->', CURRENT_VERSION);
            setStoredVersion(CURRENT_VERSION);
            
            // iOS Safari 특별 처리
            if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
                window.addEventListener('pageshow', function(event) {
                    if (event.persisted) {
                        window.location.reload();
                    }
                });
            }
            
            // 뒤로가기로 접근한 경우에만 새로고침
            var navEntries = performance.getEntriesByType('navigation');
            if (navEntries.length > 0 && navEntries[0].type === 'back_forward') {
                window.location.reload(true);
            }
        } else {
            console.log('현재 버전이 최신입니다:', CURRENT_VERSION);
        }
    }
    
    // 페이지 로드 시 버전 체크
    checkAndReload();
})();
</script>
<script src="assets/js/episode-data.js?v=c1804b80"></script>
<script src="assets/js/common.js?v=c1804b80"></script>
<script src="assets/js/iframe-mode.js?v=c1804b80"></script>

</body>
</html>
